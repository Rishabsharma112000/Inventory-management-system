version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ims_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ims_password}
      POSTGRES_DB: ${POSTGRES_DB:-ims_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ./ims-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - DB_DIALECT=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-ims_user}
      - DB_PASS=${POSTGRES_PASSWORD:-ims_password}
      - DB_NAME=${POSTGRES_DB:-ims_db}
      - JWT_SECRET=${JWT_SECRET:-ims-secret}
    depends_on:
      - postgres
    volumes:
      - ./ims-backend:/app

  frontend:
    build: ./ims-frontend
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres-data:
